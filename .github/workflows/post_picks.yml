name: Post Picks to Telegram

on:
  push:
    paths:
      - 'output/picks.json'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run Telegram publisher
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
          TELEGRAM_PAID_CHANNEL_ID: ${{ secrets.TELEGRAM_PAID_CHANNEL_ID }}
          MODEL_OUTPUT_PATH:        ./output/picks.json
          DRY_RUN:                  false
          LOG_LEVEL:                INFO
          TN_EDGE_THRESHOLD:        20
          TN_MIN_COMP:              70
          TN_MIN_N:                 10
          TN_MIN_STRENGTH:          65
          FB_MIN_EDGE_PCT:          10
          FB_MIN_MATCHES:           10
        run: python scheduler.py --run-now --telegram-only
